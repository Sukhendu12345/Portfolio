<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<!-- ============ LOGIN SCREEN ============ -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="logo-dot"></div>
    <h1>অ্যাডমিন প্যানেল</h1>
    <p class="sub">পোর্টফোলিও এডিট করতে লগইন করুন</p>
    <input type="password" id="login-password" placeholder="পাসওয়ার্ড" autocomplete="current-password">
    <div class="login-error" id="login-error"></div>
    <button class="btn-admin btn-admin--primary" id="login-btn" style="width:100%; justify-content:center;">লগইন করুন</button>
    <div class="login-hint">ডিফল্ট পাসওয়ার্ড: <b>admin123</b><br>(Security ট্যাব থেকে পরিবর্তন করুন)</div>
  </div>
</div>

<!-- ============ ADMIN APP ============ -->
<div class="admin-app" id="admin-app">

  <div class="admin-topbar">
    <div class="admin-brand"><span class="dot"></span> Portfolio Admin <span class="dirty-dot" id="dirty-dot" title="Unsaved changes"></span></div>
    <div class="admin-topbar-actions">
      <a class="btn-admin btn-admin--sm" href="index.html" target="_blank">সাইট দেখুন</a>
      <button class="btn-admin btn-admin--primary btn-admin--sm" id="save-btn">সেভ করুন</button>
      <button class="btn-admin btn-admin--ghost btn-admin--sm" id="logout-btn">লগআউট</button>
    </div>
  </div>

  <div class="admin-body-layout">
    <nav class="admin-sidebar" id="admin-sidebar">
      <button data-tab="site" class="active">⚙ সাইট ও থিম</button>
      <button data-tab="hero">🚀 হিরো সেকশন</button>
      <button data-tab="about">👤 আমার পরিচিতি</button>
      <button data-tab="skills">🛠 স্কিল</button>
      <button data-tab="projects">📁 প্রজেক্ট</button>
      <button data-tab="experience">🎓 অভিজ্ঞতা ও শিক্ষা</button>
      <button data-tab="services">💼 সার্ভিস</button>
      <button data-tab="contact">✉ যোগাযোগ</button>
      <button data-tab="data">📦 ডেটা (Export/Import)</button>
      <button data-tab="security">🔒 পাসওয়ার্ড</button>
    </nav>

    <main class="admin-main">
      <div class="admin-panel active" id="panel-site"></div>
      <div class="admin-panel" id="panel-hero"></div>
      <div class="admin-panel" id="panel-about"></div>
      <div class="admin-panel" id="panel-skills"></div>
      <div class="admin-panel" id="panel-projects"></div>
      <div class="admin-panel" id="panel-experience"></div>
      <div class="admin-panel" id="panel-services"></div>
      <div class="admin-panel" id="panel-contact"></div>
      <div class="admin-panel" id="panel-data"></div>
      <div class="admin-panel" id="panel-security"></div>
    </main>
  </div>

  <div class="admin-toast" id="admin-toast"></div>
</div>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
